<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Image Checker</title>
<style>
  :root { color-scheme: dark; }
  body { font-family: -apple-system, system-ui, sans-serif; background: #14161a;
         color: #e6e6e6; max-width: 980px; margin: 2rem auto; padding: 0 1rem; }
  h1 { font-size: 1.4rem; } h2 { font-size: 1.1rem; margin-top: 2rem; }
  .drop { border: 2px dashed #4a5160; border-radius: 12px; padding: 3rem 1rem;
          text-align: center; cursor: pointer; transition: background .15s; }
  .drop.hover { background: #1e2330; border-color: #7aa2ff; }
  .drop input { display: none; }
  .muted { color: #9aa3b2; font-size: .9rem; }
  .verdict { padding: 1rem 1.2rem; border-radius: 10px; margin: 1.2rem 0; font-size: 1.05rem; }
  .v-red { background: #3a1f24; border: 1px solid #a94452; }
  .v-yellow { background: #3a331f; border: 1px solid #a98f44; }
  .v-green { background: #1f3a26; border: 1px solid #44a95e; }
  .cards { display: flex; flex-wrap: wrap; gap: 1rem; }
  .card { background: #1c2028; border: 1px solid #2c323e; border-radius: 10px;
          padding: .8rem; width: 180px; }
  .card canvas { width: 100%; image-rendering: pixelated; border-radius: 6px; }
  .card .s { font-size: .85rem; color: #9aa3b2; margin-top: .4rem; }
  .cell canvas { width: 216px; height: 216px; image-rendering: pixelated; border-radius: 4px; }
  #annot { max-width: 100%; border-radius: 10px; border: 1px solid #2c323e; }
  #status { margin: 1rem 0 .4rem; color: #9aa3b2; }
  #bar { height: 8px; background: #232838; border-radius: 4px; overflow: hidden;
         margin-bottom: 1rem; display: none; }
  #fill { height: 100%; width: 0%; background: #7aa2ff; transition: width .25s; }
  ul { line-height: 1.6; }
</style>
</head>
<body>
<h1>🔎 Image Checker <span class="muted">— AI watermark &amp; provenance scan</span></h1>

<label class="drop" id="drop">
  <input type="file" id="file" accept="image/*,.tif,.tiff">
  <div><strong>Drop an image here</strong> or click to choose a file</div>
  <div class="muted">JPEG / PNG / WebP / TIFF. Analysis runs entirely in your browser —
  the image is never uploaded anywhere.</div>
</label>
<div id="status">Loading Python runtime (~15 MB, first visit only)…</div>
<div id="bar"><div id="fill"></div></div>
<div id="out" style="display:none">
  <div class="verdict" id="verdict"></div>
  <h2>Provenance metadata</h2>
  <div id="meta"></div>
  <h2 id="imgtitle">Scanned image</h2>
  <p class="muted">Red boxes = confirmed star marks, yellow = likely star shapes.</p>
  <canvas id="annot"></canvas>
  <div id="tiers"></div>
</div>

<script>
const PYCODE = String.raw`
import base64, io, json, re, zlib
import numpy as np
from PIL import Image, ImageFilter

try:
    from js import report          # progress callback provided by the worker
except Exception:
    def report(pct, label):
        pass

HIGH_DEPTH_MODES = ("I;16", "I;16B", "I;16L", "I;16N", "I", "F")

def to_gray8(im):
    if im.mode in HIGH_DEPTH_MODES:
        a = np.asarray(im, dtype=np.float64)
        lo, hi = a.min(), a.max()
        a = (a - lo) / (hi - lo + 1e-9)
        return Image.fromarray((a * 255).astype(np.uint8), "L")
    return im.convert("L")

def _xmp_findings(data):
    findings = []
    packets = re.findall(rb"<x:xmpmeta[^>]*>.*?</x:xmpmeta>", data, re.S)
    if not packets and data.find(b"http://ns.adobe.com/xap/1.0/") != -1:
        return ["XMP block present (unparseable)"]
    for pkt in packets:
        text = pkt.decode("utf-8", errors="replace")
        fields = [
            (r'(?:xmp:)?CreatorTool\s*=\s*"([^"]+)"|<xmp:CreatorTool>([^<]+)<',
             "XMP creator tool"),
            (r'DigitalSourceType\s*=\s*"([^"]+)"|<Iptc4xmpExt:DigitalSourceType>([^<]+)<',
             "XMP digital source type"),
            (r'(?:photoshop|plus):Credit\s*=\s*"([^"]+)"|<(?:photoshop|plus):Credit>([^<]+)<',
             "XMP credit"),
            (r'dc:creator[^>]*>.*?<rdf:li[^>]*>([^<]+)<', "XMP creator"),
        ]
        got = False
        for pattern, label in fields:
            for m in re.finditer(pattern, text, re.S):
                val = next((g for g in m.groups() if g), "").strip()
                if val:
                    findings.append(f"{label}: {val[:120]}")
                    got = True
        if not got:
            findings.append("XMP packet present (no notable fields)")
    return findings

def _c2pa_findings(data):
    findings = []
    idx = data.find(b"c2pa.claim")
    if idx == -1:
        idx = data.find(b"c2pa")
        if idx == -1 or data.find(b"jumb") == -1:
            return findings
    findings.append("C2PA content credentials manifest present")
    region = data[max(0, idx - 4000):idx + 4000]
    gi = region.find(b"claim_generator")
    if gi != -1:
        run = re.search(rb"[\x20-\x7e]{4,120}", region[gi + 15:gi + 300])
        if run:
            findings.append(
                f"C2PA claim generator: {run.group().decode(errors='replace').strip()[:120]}")
    for tool in (b"Adobe Firefly", b"Photoshop", b"DALL-E", b"OpenAI",
                 b"Google", b"Gemini", b"Microsoft"):
        if region.find(tool) != -1:
            findings.append(f"C2PA mentions: {tool.decode()}")
    return findings

def _png_findings(data):
    findings = []
    if data[:8] != b"\x89PNG\r\n\x1a\n":
        return findings
    pos = 8
    while pos + 8 <= len(data):
        length = int.from_bytes(data[pos:pos + 4], "big")
        ctype = data[pos + 4:pos + 8]
        chunk = data[pos + 8:pos + 8 + length]
        pos += 12 + length
        if ctype not in (b"tEXt", b"iTXt", b"zTXt"):
            if ctype == b"IEND":
                break
            continue
        try:
            key, _, rest = chunk.partition(b"\x00")
            key = key.decode("latin-1")
            if ctype == b"tEXt":
                val = rest
            elif ctype == b"zTXt":
                val = zlib.decompress(rest[1:])
            else:
                comp = rest[0:1] == b"\x01"
                body = rest[2:]
                _, _, body = body.partition(b"\x00")
                _, _, body = body.partition(b"\x00")
                val = zlib.decompress(body) if comp else body
            val = val.decode("utf-8", errors="replace").strip()
        except Exception:
            continue
        lk = key.lower()
        if lk == "parameters":
            findings.append("PNG 'parameters' chunk — Stable Diffusion WebUI "
                            f"(declared AI): {val[:120]}")
        elif lk in ("prompt", "workflow"):
            findings.append(f"PNG '{key}' chunk — ComfyUI (declared AI): {val[:120]}")
        elif lk in ("software", "comment", "description", "author", "source",
                    "generator", "creation time"):
            findings.append(f"PNG {key}: {val[:120]}")
    return findings

AI_MARKERS = [
    (b"trainedAlgorithmicMedia", "IPTC trainedAlgorithmicMedia (declared AI)"),
    (b"Made with Google AI", "'Made with Google AI' credit (Gemini/Imagen)"),
    (b"GContainer", "Google GContainer (Gemini/Pixel)"),
    (b"SynthID", "SynthID mentioned in metadata"),
    (b"Midjourney", "Midjourney"),
    (b"DALL-E", "DALL-E"),
    (b"Adobe Firefly", "Adobe Firefly"),
    (b"Stable Diffusion", "Stable Diffusion"),
    (b"ComfyUI", "ComfyUI"),
    (b"NovelAI", "NovelAI"),
]

def check_metadata(data):
    findings = []
    findings += _c2pa_findings(data)
    findings += _xmp_findings(data)
    findings += _png_findings(data)
    try:
        exif = Image.open(io.BytesIO(data)).getexif()
        for tag, label in ((305, "software"), (271, "camera make"),
                           (272, "camera model"), (315, "artist"), (306, "modified")):
            if tag in exif:
                findings.append(f"{label}: {str(exif[tag]).strip()[:120]}")
    except Exception:
        pass
    if data.find(b"Exif\x00\x00") != -1 and not any(
            f.startswith(("software", "camera", "artist", "modified"))
            for f in findings):
        findings.append("EXIF block present")
    for marker, label in AI_MARKERS:
        if data.find(marker) != -1:
            findings.append(label)
    seen, out = set(), []
    for f in findings:
        if f not in seen:
            seen.add(f)
            out.append(f)
    return out

def make_star_template(size=32, p=0.5):
    n = size
    y, x = np.mgrid[0:n, 0:n]
    c = (n - 1) / 2
    dx, dy = np.abs(x - c) / c, np.abs(y - c) / c
    return ((dx ** p + dy ** p) <= 1.0).astype(np.float64)

def ncc_match(img, tpl):
    ih, iw = img.shape
    th, tw = tpl.shape
    tplz = tpl - tpl.mean()
    tnorm = np.sqrt((tplz ** 2).sum())
    fshape = (ih + th - 1, iw + tw - 1)
    F = np.fft.rfft2(img, fshape)
    T = np.fft.rfft2(tplz[::-1, ::-1], fshape)
    corr = np.fft.irfft2(F * T, fshape)[th - 1:ih, tw - 1:iw]
    ii = np.cumsum(np.cumsum(np.pad(img, ((1, 0), (1, 0))), 0), 1)
    ii2 = np.cumsum(np.cumsum(np.pad(img ** 2, ((1, 0), (1, 0))), 0), 1)
    s = ii[th:, tw:] - ii[:-th, tw:] - ii[th:, :-tw] + ii[:-th, :-tw]
    s2 = ii2[th:, tw:] - ii2[:-th, tw:] - ii2[th:, :-tw] + ii2[:-th, :-tw]
    npix = th * tw
    var = np.maximum(s2 - s ** 2 / npix, 1e-9)
    return corr / (np.sqrt(var) * tnorm)

def find_sparkles(channels, threshold=0.55):
    raw, blur = channels
    configs = [(raw, 0.5, (16, 24, 32, 48, 64)),
               (raw, 1.0, (16, 24, 32, 48, 64)),
               (blur, 0.5, (16, 24, 32, 48, 64)),
               (blur, 1.0, (12, 16, 24, 32, 48, 64))]
    total = sum(len(s) for _, _, s in configs)
    done = 0
    hits = []
    for img, p, sizes in configs:
        for size in sizes:
            done += 1
            report(4 + int(58 * done / total),
                   f"Searching for star marks — pass {done}/{total}")
            if size >= min(img.shape):
                continue
            score = ncc_match(img, make_star_template(size, p))
            while True:
                ij = np.unravel_index(np.argmax(score), score.shape)
                v = score[ij]
                if v < threshold:
                    break
                cy, cx = ij[0] + size // 2, ij[1] + size // 2
                hits.append((v, cx, cy, size))
                y0, y1 = max(0, ij[0] - size), ij[0] + size
                x0, x1 = max(0, ij[1] - size), ij[1] + size
                score[y0:y1, x0:x1] = 0
    merged = []
    for v, cx, cy, size in sorted(hits, reverse=True):
        if all((cx - m[1]) ** 2 + (cy - m[2]) ** 2 > (max(size, m[3])) ** 2
               for m in merged):
            merged.append((v, cx, cy, size))
    return merged

def arm_score(img, cx, cy, R, fat=False):
    H, W = img.shape
    M = int(1.55 * R) + 2
    if not (M <= cy < H - M and M <= cx < W - M):
        return None
    p = img[cy - M:cy + M + 1, cx - M:cx + M + 1]
    c = M
    if fat:
        rs = np.arange(max(2, int(R * 0.50)), max(int(R * 0.90), 4))
        o = max(3, int(R * 0.60))
    else:
        rs = np.arange(max(2, int(R * 0.30)), max(int(R * 0.85), 4))
        o = max(3, int(R * 0.45))
    rt = np.arange(int(R * 1.10), max(int(R * 1.45), int(R * 1.10) + 2))
    d = (rs / np.sqrt(2)).astype(int)
    diag = np.concatenate([p[c + d, c + d], p[c + d, c - d],
                           p[c - d, c + d], p[c - d, c - d]])
    rd = np.arange(max(2, int(R * 0.80)), max(int(R * 1.05), int(R * 0.80) + 2))
    dd = (rd / np.sqrt(2)).astype(int)
    diag_far = np.concatenate([p[c + dd, c + dd], p[c + dd, c - dd],
                               p[c - dd, c + dd], p[c - dd, c - dd]])
    center = p[c - 1:c + 2, c - 1:c + 2].mean()
    pol = 1.0 if center >= diag.mean() else -1.0
    arms = []
    for dx, dy in ((1, 0), (-1, 0), (0, 1), (0, -1)):
        px, py = -dy, dx
        on = p[c + dy * rs, c + dx * rs]
        side = np.concatenate([p[c + dy * rs + py * o, c + dx * rs + px * o],
                               p[c + dy * rs - py * o, c + dx * rs - px * o]])
        norm = side.std() + 0.03
        contrast = pol * (on.mean() - side.mean()) / norm
        tip = p[c + dy * rt, c + dx * rt]
        ends = pol * (on.mean() - tip.mean()) / norm
        dterm = pol * (on.mean() - diag_far.mean()) / norm
        prof = np.convolve(on, np.ones(3) / 3, mode="valid") if len(on) >= 3 else on
        gap = pol * (prof.min() if pol > 0 else prof.max()) - pol * side.mean()
        gap /= norm
        arms.append(min(contrast, 1.5 * ends, 1.5 * dterm, 2.0 * gap))
    return min(arms)

def upscaled_arm(img, cx, cy, R):
    m = 4 * R + 8
    if not (m <= cy < img.shape[0] - m and m <= cx < img.shape[1] - m):
        return None
    patch = img[cy - m:cy + m, cx - m:cx + m]
    im = Image.fromarray((patch * 255).astype(np.uint8)).resize(
        (4 * m, 4 * m), Image.BICUBIC)
    up = np.asarray(im, dtype=np.float64) / 255.0
    best = None
    for fat in (False, True):
        for dy in (-4, -2, 0, 2, 4):
            for dx in (-4, -2, 0, 2, 4):
                s = arm_score(up, 2 * m + dx, 2 * m + dy, 2 * R, fat)
                if s is not None and (best is None or s > best):
                    best = s
    return best

def periodicity(raw, blur, cx, cy, size):
    w = max(24, 3 * size)
    H, W = raw.shape
    x0 = min(max(cx - w, 0), max(W - 2 * w, 0))
    y0 = min(max(cy - w, 0), max(H - 2 * w, 0))
    a = (raw - blur)[y0:y0 + 2 * w, x0:x0 + 2 * w]
    if min(a.shape) < 16:
        return 0.0
    a = a - a.mean()
    P = np.abs(np.fft.rfft2(a)) ** 2
    ac = np.fft.irfft2(P, a.shape)
    ac = ac / (ac[0, 0] + 1e-12)
    ny, nx = a.shape
    yy, xx = np.mgrid[0:ny, 0:nx]
    lag2 = np.minimum(yy, ny - yy) ** 2 + np.minimum(xx, nx - xx) ** 2
    mask = (lag2 >= 9) & (lag2 <= 24 ** 2)
    return float(ac[mask].max()) if mask.any() else 0.0

def star_verify(channels, cx0, cy0, size):
    best = -9.0
    for ci, img in enumerate(channels):
        for fat in (False, True):
            for f in (0.5, 0.75, 1.0, 1.5, 2.0):
                R = max(8, int(size * f))
                if ci > 0 and R < 24:
                    continue
                step = max(2, R // 6)
                for dy in (-2 * step, -step, 0, step, 2 * step):
                    for dx in (-2 * step, -step, 0, step, 2 * step):
                        s = arm_score(img, cx0 + dx, cy0 + dy, R, fat)
                        if s is not None and s > best:
                            best = s
    if size <= 20 and best < 2.0:
        up = -9.0
        for img in channels:
            for R in range(max(5, size // 2 - 2), size // 2 + 3):
                s = upscaled_arm(img, cx0, cy0, R)
                if s is not None and s > up:
                    up = s
        if up > best:
            if periodicity(channels[0], channels[1], cx0, cy0, size) >= 0.33:
                up = min(up, 0.9)
            best = max(best, up)
    return best

def analyze(data, max_candidates=200):
    data = bytes(data)
    report(1, "Reading image")
    meta = check_metadata(data)
    im = to_gray8(Image.open(io.BytesIO(data)))
    raw = np.asarray(im, dtype=np.float64) / 255.0
    blur = np.asarray(im.filter(ImageFilter.GaussianBlur(2)), dtype=np.float64) / 255.0
    channels = (raw, blur)
    hits = sorted(find_sparkles(channels), reverse=True)[:max_candidates]
    scored = []
    n = len(hits)
    for i, (ncc, cx, cy, size) in enumerate(hits):
        if i % 5 == 0:
            report(62 + int(36 * i / max(n, 1)),
                   f"Verifying star geometry — candidate {i}/{n}")
        scored.append((star_verify(channels, cx, cy, size), ncc, cx, cy, size))
    scored.sort(reverse=True)
    report(99, "Rendering results")
    cands = [{"star": round(float(s), 2), "ncc": round(float(n_), 2),
              "x": int(x), "y": int(y), "size": int(z)}
             for s, n_, x, y, z in scored]
    return json.dumps({"meta": meta, "w": im.size[0], "h": im.size[1],
                       "candidates": cands})

def to_png_b64(data):
    """PNG preview for formats the browser can't display (e.g. TIFF)."""
    im = Image.open(io.BytesIO(bytes(data)))
    im = (to_gray8(im) if im.mode in HIGH_DEPTH_MODES else im).convert("RGB")
    buf = io.BytesIO()
    im.save(buf, "PNG")
    return base64.b64encode(buf.getvalue()).decode()
`;

const WORKER_BODY = `
importScripts('https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js');
self.report = (pct, label) => self.postMessage({type: 'progress', pct, label});
const pyReady = (async () => {
  self.postMessage({type: 'status', text: 'Loading Python runtime (~15 MB, first visit only)…'});
  const py = await loadPyodide();
  self.postMessage({type: 'status', text: 'Loading numpy + Pillow…'});
  await py.loadPackage(['numpy', 'pillow']);
  py.runPython(self.PYCODE);
  self.postMessage({type: 'ready'});
  return py;
})();
self.onmessage = async (e) => {
  const {id, cmd, buf} = e.data;
  try {
    const py = await pyReady;
    const u8 = new Uint8Array(buf);
    const fn = py.globals.get(cmd === 'analyze' ? 'analyze' : 'to_png_b64');
    self.postMessage({id, type: 'done', result: fn(py.toPy(u8))});
  } catch (err) {
    self.postMessage({id, type: 'error', message: String(err)});
  }
};
`;

const $ = id => document.getElementById(id);

function setStatus(text, pct) {
  $('status').textContent = text;
  if (pct == null) { $('bar').style.display = 'none'; }
  else { $('bar').style.display = 'block'; $('fill').style.width = pct + '%'; }
}

const pending = new Map();
let nextId = 1;
const workerSrc = 'self.PYCODE = ' + JSON.stringify(PYCODE) + ';\n' + WORKER_BODY;
const worker = new Worker(URL.createObjectURL(new Blob([workerSrc], {type: 'text/javascript'})));
worker.onmessage = (e) => {
  const d = e.data;
  if (d.type === 'status') setStatus(d.text, null);
  else if (d.type === 'ready') setStatus('Ready — drop an image to check it.', null);
  else if (d.type === 'progress') setStatus(d.label + '…', d.pct);
  else if (d.id && pending.has(d.id)) {
    const {resolve, reject} = pending.get(d.id);
    pending.delete(d.id);
    d.type === 'done' ? resolve(d.result) : reject(new Error(d.message));
  }
};
worker.onerror = (e) => setStatus('Worker error: ' + (e.message || e), null);

function call(cmd, buf) {
  return new Promise((resolve, reject) => {
    const id = nextId++;
    pending.set(id, {resolve, reject});
    worker.postMessage({id, cmd, buf});
  });
}

const CONFIRMED = 2.0, LIKELY = 1.0, WEAK_SHOWN = 40;

function cropCanvas(img, cx, cy, size, out) {
  const half = Math.max(Math.round(size * 1.6), 40);
  const x0 = Math.max(0, cx - half), y0 = Math.max(0, cy - half);
  const w = Math.min(img.width, cx + half) - x0, h = Math.min(img.height, cy + half) - y0;
  const c = document.createElement('canvas');
  c.width = out; c.height = out;
  const g = c.getContext('2d');
  g.imageSmoothingEnabled = false;
  g.drawImage(img, x0, y0, w, h, 0, 0, out, out);
  return c;
}

function card(img, c) {
  const div = document.createElement('div');
  div.className = 'card';
  div.appendChild(cropCanvas(img, c.x, c.y, c.size, 160));
  const s = document.createElement('div');
  s.className = 's';
  s.textContent = `(${c.x}, ${c.y}) · star ${c.star.toFixed(1)} · ncc ${c.ncc.toFixed(2)}`;
  div.appendChild(s);
  return div;
}

function section(title, note) {
  const h = document.createElement('h2'); h.textContent = title;
  const p = document.createElement('p'); p.className = 'muted'; p.textContent = note;
  const div = document.createElement('div'); div.className = 'cards';
  $('tiers').append(h, p, div);
  return div;
}

let busy = false;
async function run(file) {
  if (busy) return;
  busy = true;
  $('out').style.display = 'none';
  try {
    setStatus('Reading file…', 2);
    const buf = await file.arrayBuffer();
    const res = JSON.parse(await call('analyze', buf.slice(0)));

    const img = new Image();
    img.src = URL.createObjectURL(new Blob([buf]));
    try { await img.decode(); }
    catch { // browser can't display this format (e.g. TIFF): ask Python for a PNG
      img.src = 'data:image/png;base64,' + await call('png', buf.slice(0));
      await img.decode();
    }

    const confirmed = res.candidates.filter(c => c.star >= CONFIRMED);
    const likely = res.candidates.filter(c => c.star >= LIKELY && c.star < CONFIRMED);
    const weak = res.candidates.filter(c => c.star < LIKELY).slice(0, WEAK_SHOWN);

    const v = $('verdict');
    const declared = res.meta.some(m => /C2PA|Gemini|AI/.test(m));
    if (declared) { v.className = 'verdict v-red'; v.textContent = '🚨 File metadata declares AI generation or carries content credentials.'; }
    else if (confirmed.length) { v.className = 'verdict v-red'; v.textContent = `🚨 ${confirmed.length} four-pointed star mark(s) confirmed — inspect the red crops. An isolated star on a flat area is an AI watermark.`; }
    else if (likely.length) { v.className = 'verdict v-yellow'; v.textContent = `⚠️ ${likely.length} star-like shape(s) found — check the crops to judge whether they are watermarks or just artwork.`; }
    else { v.className = 'verdict v-green'; v.textContent = '✅ No star watermark found. Absence of evidence is not proof — watermarks can be cropped, and very faint marks can hide among the weak candidates.'; }

    const synthidNote = '<p class="muted">ℹ️ SynthID (Google\'s invisible pixel watermark) cannot be checked locally — Google has not published a detector. To test, upload the image to Gemini and ask: “Does this image contain a SynthID watermark?”</p>';
    $('meta').innerHTML = (res.meta.length
      ? '<ul>' + res.meta.map(m => `<li>${m.replace(/</g,'&lt;')}</li>`).join('') + '</ul>'
      : '<p class="muted">None — C2PA/XMP/EXIF/PNG-chunks fully stripped. Proves nothing by itself, but the file\'s history can\'t be traced.</p>') + synthidNote;

    $('imgtitle').textContent = `Scanned image (${res.w}×${res.h})`;
    const an = $('annot');
    an.width = res.w; an.height = res.h;
    const g = an.getContext('2d');
    g.drawImage(img, 0, 0);
    g.lineWidth = Math.max(2, res.w / 500);
    for (const [list, color] of [[confirmed, '#ff4455'], [likely, '#e6c34a']]) {
      g.strokeStyle = color;
      for (const c of list) g.strokeRect(c.x - c.size, c.y - c.size, 2 * c.size, 2 * c.size);
    }

    $('tiers').innerHTML = '';
    if (confirmed.length) {
      const d = section(`Confirmed star marks (${confirmed.length})`,
        'Clean four-pointed star geometry. On a flat area or asset corner (not inside artwork like a night sky) it is almost certainly an AI watermark.');
      confirmed.forEach(c => d.appendChild(card(img, c)));
    }
    if (likely.length) {
      const d = section(`Likely star shapes (${likely.length})`,
        'Star-like geometry — may be watermarks, decorative sparkles, or star glints inside artwork. Judge by what surrounds them.');
      likely.forEach(c => d.appendChild(card(img, c)));
    }
    if (weak.length) {
      const d = section(`Weak candidates (${weak.length} shown)`,
        'Ranked; mostly noise, but very faint watermarks can end up here — scan if the image is suspicious.');
      weak.forEach(c => {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.appendChild(cropCanvas(img, c.x, c.y, c.size, 216));
        d.appendChild(cell);
      });
    }
    $('out').style.display = 'block';
    setStatus('Done. Drop another image to check it.', null);
  } catch (e) {
    setStatus('Could not analyze this file: ' + e.message, null);
  } finally {
    busy = false;
  }
}

const drop = $('drop'), file = $('file');
file.addEventListener('change', () => file.files.length && run(file.files[0]));
['dragover', 'dragenter'].forEach(e => drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.add('hover'); }));
['dragleave', 'drop'].forEach(e => drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.remove('hover'); }));
drop.addEventListener('drop', ev => { ev.preventDefault(); ev.dataTransfer.files.length && run(ev.dataTransfer.files[0]); });
</script>
</body>
</html>
